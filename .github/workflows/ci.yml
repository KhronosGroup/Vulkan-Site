# Github CI file for Vulkan Antora Guide

name: CI

# Controls when the action will run.
on:
  push:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      Antora_UI_Hash:
        description: 'Antora UI hash (branch name or tag) to use passed from the caller workflow'
        default: 'main'
        required: false
        type: string
      GLSL_Commit_Hash:
        description: 'GLSL Commit hash (branch name or tag) to use passed from the caller workflow'
        default: 'main'
        required: false
        type: string
      Guide_Commit_Hash:
        description: 'Guide Commit hash (branch name or tag) to use passed from the caller workflow'
        default: 'main'
        required: false
        type: string
      DOC_Commit_Hash:
        description: 'Docs Commit hash (branch name or tag) to use passed from the caller workflow'
        default: 'main'
        required: false
        type: string
      Samples_Commit_Hash:
        description: 'Samples Commit hash (branch name or tag) to use passed from the caller workflow'
        default: 'main'
        required: false
        type: string
      Tutorial_Commit_Hash:
        description: 'Tutorial Commit hash (branch name or tag) to use passed from the caller workflow'
        default: 'main'
        required: false
        type: string
      Publish_Local:
        description: 'Should publish to the local github pages https://${GITHUB_REPOSITORY}.github.io'
        default: true
        required: false
        type: boolean
      Include_Guide:
        description: 'Should include the Vulkan-Guide module'
        default: true
        required: false
        type: boolean
      Include_GLSL:
        description: 'Should include the GLSL module'
        default: true
        required: false
        type: boolean
      Include_Docs:
        description: 'Should include the Vulkan-Docs module'
        default: true
        required: false
        type: boolean
      Include_Samples:
        description: 'Should include the Vulkan-Samples module'
        default: true
        required: false
        type: boolean
      Include_Tutorial:
        description: 'Should include the Vulkan-Tutorial module'
        default: true
        required: false
        type: boolean
      Include_Attachments:
        description: 'Should include the attachments folder for the tutorial (cleans it first)'
        default: true
        required: false
        type: boolean
      Optimize_Images:
        description: 'Should optimize the images folder'
        default: false
        required: false
        type: boolean
      PR_Number:
        description: 'PR number to publish to (leave empty for main site)'
        default: ''
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can
      # access it
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: "REUSE license checker"
        uses: fsfe/reuse-action@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: "Cache UI bundle"
        id: cache-ui
        uses: actions/cache@v4
        with:
          path: build/ui-bundle.zip
          key: ${{ runner.os }}-ui-${{ hashFiles('src/**', 'package-lock.json', 'gulpfile.js') }}

      - name: "checkout GLSL"
        if: ${{ (github.event.inputs.Include_GLSL || 'true') != 'false' }}
        uses: actions/checkout@v4
        with:
          repository: KhronosGroup/GLSL
          path: ./GLSL
          ref: ${{ inputs.GLSL_Commit_Hash > '' && inputs.GLSL_Commit_Hash || 'main' }}

      - name: "checkout Vulkan Guide"
        if: ${{ (github.event.inputs.Include_Guide || 'true') != 'false' }}
        uses: actions/checkout@v4
        with:
          repository: KhronosGroup/Vulkan-Guide
          path: ./Vulkan-Guide
          ref: ${{ inputs.Guide_Commit_Hash > '' && inputs.Guide_Commit_Hash || 'main' }}

      - name: "Checkout Vulkan Docs"
        if: ${{ (github.event.inputs.Include_Docs || 'true') != 'false' }}
        uses: actions/checkout@v4
        with:
          repository: KhronosGroup/Vulkan-Docs
          path: ./Vulkan-Docs
          ref: ${{ inputs.DOC_Commit_Hash > '' && inputs.DOC_Commit_Hash || 'main' }}

      - name: "Checkout Vulkan Samples"
        if: ${{ (github.event.inputs.Include_Samples || 'true') != 'false' }}
        uses: actions/checkout@v4
        with:
          repository: KhronosGroup/Vulkan-Samples
          path: ./Vulkan-Samples
          ref: ${{ inputs.Samples_Commit_Hash > '' && inputs.Samples_Commit_Hash || 'main' }}

      - name: "Checkout Vulkan Tutorial"
        if: ${{ (github.event.inputs.Include_Tutorial || 'true') != 'false' }}
        uses: actions/checkout@v4
        with:
          repository: KhronosGroup/Vulkan-Tutorial
          path: ./Vulkan-Tutorial
          ref: ${{ inputs.Tutorial_Commit_Hash > '' && inputs.Tutorial_Commit_Hash || 'main' }}

      - name: "setup npm"
        uses: actions/setup-node@v4
        with:
          node-version: '20.12.2'
          cache: 'npm'
          cache-dependency-path: |
            docs-site/package-lock.json
            package-lock.json
            Vulkan-Docs/package-lock.json

      - name: "run npm installs (parallel)"
        run: |
          (cd docs-site && npm ci) &
          if [ -d "Vulkan-Docs" ]; then (cd Vulkan-Docs && npm ci) & fi
          if [ "${{ steps.cache-ui.outputs.cache-hit }}" != "true" ]; then npm ci & fi
          wait

      - name: "ensure we have all dependencies for building/searching/highlighting"
        run: |
          sudo gem install rouge
          sudo apt-get update
          sudo apt install xorg-dev libglu1-mesa-dev
          sudo apt-get install -y asciidoctor optipng jpegoptim
          pip install lxml PyYAML

      - name: "build the ui bundle"
        if: steps.cache-ui.outputs.cache-hit != 'true'
        run: |
          ./node_modules/gulp/bin/gulp.js bundle

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ui-bundle.zip
          path: build/ui-bundle.zip
          retention-days: 5

      - name: "copy ui-bundle.zip to vulkan-site"
        run: cp build/ui-bundle.zip docs-site/

      - name: "prepare tutorials"
        if: ${{ (github.event.inputs.Include_Tutorial || 'true') != 'false' }}
        working-directory: Vulkan-Tutorial/antora
        run: |
          make setup_tutorial

      - name: "prepare repos with make (parallel)"
        run: |
          if [[ "${{ (github.event.inputs.Include_GLSL || 'true') != 'false' }}" == "true" ]]; then make prep-glsl & fi
          if [[ "${{ (github.event.inputs.Include_Guide || 'true') != 'false' }}" == "true" ]]; then make prep-guide & fi
          if [[ "${{ (github.event.inputs.Include_Docs || 'true') != 'false' }}" == "true" ]]; then make prep-docs & fi
          wait

      - name: "prepare samples"
        if: ${{ (github.event.inputs.Include_Samples || 'true') != 'false' }}
        working-directory: Vulkan-Samples
        run: cmake -H"." -B"build/unix" -DVKB_GENERATE_ANTORA_SITE=ON

      - name: "Prepare Antora Playbook"
        run: |
          python3 docs-site/prepare_playbook.py \
            --guide "${{ (github.event.inputs.Include_Guide || 'true') != 'false' }}" \
            --glsl "${{ (github.event.inputs.Include_GLSL || 'true') != 'false' }}" \
            --docs "${{ (github.event.inputs.Include_Docs || 'true') != 'false' }}" \
            --samples "${{ (github.event.inputs.Include_Samples || 'true') != 'false' }}" \
            --tutorial "${{ (github.event.inputs.Include_Tutorial || 'true') != 'false' }}" \
            --attachments "${{ (github.event.inputs.Include_Attachments || 'true') != 'false' }}" \
            --optimize "${{ github.event.inputs.Optimize_Images == 'true' }}"

      - name: "Cache Antora content"
        uses: actions/cache@v4
        with:
          path: docs-site/.antora-cache
          key: ${{ runner.os }}-antora-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-antora-

      - name: "build (npx) with stacktrace"
        working-directory: docs-site
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          npx antora antora-playbook.yml --cache-dir .antora-cache
          touch build/site/.nojekyll

      - name: 'Upload site artifact'
        uses: actions/upload-artifact@v4
        with:
          name: fullSite
          path: docs-site/build
          retention-days: 5

      - name: "Checkout gh-pages for staging"
        if: "${{ (github.event.inputs.Publish_Local || 'true') != 'false' }}"
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: public-site
          fetch-depth: 1

      - name: Stage deployment
        if: "${{ (github.event.inputs.Publish_Local || 'true') != 'false' }}"
        id: stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Determine if this is a PR build or a main-site build.
          IS_PR="false"
          PR_NUM=""
          if [[ "${{ github.event.pull_request }}" != "" || "${{ github.event.inputs.PR_Number }}" != "" ]]; then
            IS_PR="true"
            PR_NUM="${{ github.event.inputs.PR_Number }}"
            if [ -z "$PR_NUM" ]; then PR_NUM="${{ github.event.number }}"; fi
          fi
          echo "is_pr=${IS_PR}" >> "$GITHUB_OUTPUT"
          echo "pr_num=${PR_NUM}" >> "$GITHUB_OUTPUT"

          # Defense in depth: strip any Assets/assets dirs the builder may have emitted.
          find docs-site/build/site -type d \( -name "Assets" -o -name "assets" \) -exec rm -rf {} + || true
          touch docs-site/build/site/.nojekyll

          # 1) Update the gh-pages checkout with the freshly built content.
          if [[ "$IS_PR" == "true" ]]; then
            TARGET_DIR="public-site/PR-${PR_NUM}"
            echo "Staging preview for PR ${PR_NUM} in ${TARGET_DIR}"
            mkdir -p "$TARGET_DIR"
            rsync -a --delete docs-site/build/site/ "$TARGET_DIR/"
          else
            echo "Staging main site (preserving PR-* previews on gh-pages)"
            rsync -a --delete --exclude='PR-*' --exclude='.git' docs-site/build/site/ public-site/
            touch public-site/.nojekyll
          fi

          # 2) Prune PR-* folders whose PR is no longer open. When a PR is merged
          #    or closed, pr-cleanup.yml also removes its folder, but this acts
          #    as a safety net and keeps the artifact from carrying stale PRs.
          if command -v gh >/dev/null 2>&1; then
            OPEN_PRS=$(gh pr list --repo "${{ github.repository }}" --state open \
              --json number --jq '.[].number' 2>/dev/null || echo "")
            if [ -n "${OPEN_PRS}" ]; then
              OPEN_SET=" $(echo "$OPEN_PRS" | tr '\n' ' ') "
              for d in public-site/PR-*; do
                [ -d "$d" ] || continue
                n="${d##*/PR-}"
                if ! echo "$OPEN_SET" | grep -q " ${n} "; then
                  # Keep the PR currently being built, just in case.
                  if [[ "$IS_PR" == "true" && "$n" == "${PR_NUM}" ]]; then continue; fi
                  echo "Pruning closed PR folder: $d"
                  rm -rf "$d"
                fi
              done
            fi
          fi

          # 3) Build the Pages artifact payload from the full gh-pages tree
          #    (main site + all still-open PR previews), then deduplicate in a
          #    tar-safe way (symlinks/hardlinks are dereferenced by
          #    upload-pages-artifact, so we use HTML redirect stubs + binary
          #    reference rewriting instead).
          rm -rf pages-artifact
          mkdir -p pages-artifact
          rsync -a --exclude='.git' public-site/ pages-artifact/
          touch pages-artifact/.nojekyll

          echo "Artifact size before dedup:"
          du -sh pages-artifact || true

          if [ "${IS_PR}" = "true" ]; then
            python3 docs-site/economize_preview.py \
              --site "pages-artifact/PR-${PR_NUM}" \
              --base pages-artifact \
              --stub-dirs refpages
          fi
          # Main-site builds skip dedup: the base IS the artifact root.

          echo "Artifact size after dedup:"
          du -sh pages-artifact || true

      - name: "Remove stale pages artifact (re-run safety)"
        if: "${{ (github.event.inputs.Publish_Local || 'true') != 'false' }}"
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              name: 'github-pages'
            });
            for (const a of artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: a.id
              });
              core.info(`Deleted stale github-pages artifact ${a.id}`);
            }

      - name: "Upload Pages Artifact"
        if: "${{ (github.event.inputs.Publish_Local || 'true') != 'false' }}"
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-artifact

      - name: "Deploy to GitHub Pages"
        if: "${{ (github.event.inputs.Publish_Local || 'true') != 'false' }}"
        uses: actions/deploy-pages@v5

      - name: "Push changes to gh-pages branch"
        if: "${{ (github.event.inputs.Publish_Local || 'true') != 'false' }}"
        run: |
          cd public-site
          git config user.name github-actions
          git config user.email github-actions@github.com
          # Add only tracked files and the PR-* preview folders.
          # Never add node_modules, source-repo clones, or build artifacts.
          git add -u
          if [ "${{ steps.stage.outputs.is_pr }}" = "true" ]; then
            git add "PR-${{ steps.stage.outputs.pr_num }}"
          fi
          git commit -m "Update site (Main/PR) [skip ci]" || echo "No changes to commit"
          git push origin gh-pages

      - name: Comment on PR
        if: github.event.pull_request && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL="${{ github.event.pull_request.html_url }}"
          echo "Debug: PR_URL=$PR_URL"
          echo "Debug: GITHUB_REPOSITORY=${{ github.repository }}"
          echo "Debug: GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"

          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/PR-${{ github.event.pull_request.number }}/"
          COMMENT_MARKER="<!-- preview-link-comment -->"
          EXISTING_COMMENT=$(gh pr view "$PR_URL" --json comments --jq ".comments[] | select(.body | contains(\"$COMMENT_MARKER\")) | .id" || echo "")

          if [ -n "$PR_URL" ] && [ -z "$EXISTING_COMMENT" ]; then
            gh pr comment "$PR_URL" --body "$COMMENT_MARKER
          Preview site published: $PREVIEW_URL"
          fi
